{% extends "base.html" %}
{% block body %}
<div class="content-section">
  <h2>Manager login</h2>
  <form method="post" class="row g-3">
    {{ form.hidden_tag() }}
    <div class="col-md-6">
      {{ form.manager_id.label(class="form-label") }}
      {{ form.manager_id(class="form-select") }}
    </div>
    <div class="col-12">
      {{ form.submit(class="btn btn-primary") }}
    </div>
  </form>
</div>
{% endblock %}
